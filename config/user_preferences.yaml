# User preferences for analysis

filters:
  # Minimum price to avoid penny stocks (HKD for HK, USD for US)
  min_price: 1.0
  
  # Maximum price (avoid extremely expensive stocks)
  max_price: 500.0
  
  # Minimum volume (shares)
  min_volume: 1000000
  
  # Minimum turnover (HKD/USD)
  min_turnover: 10000000

trading_preferences:
  # Risk tolerance: 'low', 'medium', 'high'
  risk_tolerance: 'medium'
  
  # Exclude penny stocks (< $1)
  exclude_penny_stocks: true
  
  # Minimum score for actionable signals
  min_signal_strength: 60
  
  # Focus on oversold/overbought conditions
  focus_extreme_rsi: true

alerts:
  # Send alerts for strong signals
  enable_alerts: false
  
  # Alert threshold (score)
  alert_threshold: 75
  
  # Cooldown period (hours) between alerts for same stock
  alert_cooldown_hours: 24

output:
  # Save detailed CSV reports
  save_csv: true
  
  # Generate HTML reports
  save_html: false
  
  # Show enhanced display
  enhanced_display: true
