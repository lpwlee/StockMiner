# Technical indicator configurations

sma:
  periods: [20, 50, 200]
  
ema:
  periods: [12, 26]
  
rsi:
  period: 14
  oversold_threshold: 30
  overbought_threshold: 70
  
macd:
  fast_period: 12
  slow_period: 26
  signal_period: 9
  
bollinger_bands:
  period: 20
  std_dev: 2.0
  
atr:
  period: 14
  
adx:
  period: 14
  
stochastic:
  k_period: 14
  d_period: 3
  slowing: 3
  
volume:
  sma_period: 20
  volume_ratio_threshold: 1.5
  
momentum:
  roc_period: 10
  mom_period: 10